name: Deploy Frontend

on:
  pull_request:
  push:
    branches: ["main", "deploy"]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          BACKEND_URL: https://api.plotty-stories.duckdns.org/api

  build-and-push:
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: andrey57x
          password: ${{ secrets.GHCR_PAT }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/andrey57x/plotty-frontend:latest
            ghcr.io/andrey57x/plotty-frontend:${{ github.sha }}
          build-args: |
            BACKEND_URL=https://api.plotty-stories.duckdns.org/api

  deploy:
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/plotty

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u andrey57x --password-stdin

            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d frontend
            docker image prune -f
